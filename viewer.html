<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>독서 챌린지 현황</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      padding: 16px;
    }

    header {
      text-align: center;
      margin-bottom: 20px;
    }

    header h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1a202c;
    }

    header p {
      font-size: 13px;
      color: #718096;
      margin-top: 4px;
    }

    .date-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #fff;
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .date-bar label {
      font-size: 14px;
      font-weight: 600;
      color: #4a5568;
      white-space: nowrap;
    }

    .date-bar input[type="date"] {
      flex: 1;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 14px;
      color: #2d3748;
      outline: none;
    }

    .date-bar input[type="date"]:focus {
      border-color: #667eea;
    }

    .stat-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      color: #fff;
      text-align: center;
      box-shadow: 0 4px 12px rgba(102,126,234,0.4);
    }

    .stat-card .rate {
      font-size: 48px;
      font-weight: 800;
      line-height: 1;
    }

    .stat-card .rate-label {
      font-size: 14px;
      opacity: 0.85;
      margin-top: 6px;
    }

    .stat-card .count-label {
      font-size: 16px;
      font-weight: 600;
      margin-top: 8px;
    }

    .progress-bar {
      background: rgba(255,255,255,0.3);
      border-radius: 100px;
      height: 8px;
      margin-top: 12px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: #fff;
      border-radius: 100px;
      transition: width 0.4s ease;
    }

    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: #718096;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 10px;
    }

    .member-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }

    .member-btn {
      background: #fff;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      padding: 14px 8px;
      text-align: center;
      cursor: default;
      font-size: 14px;
      font-weight: 600;
      color: #4a5568;
      position: relative;
      user-select: none;
    }

    .member-btn.checked {
      background: #ebf4ff;
      border-color: #667eea;
      color: #434190;
    }

    .member-btn.checked::after {
      content: '✓';
      position: absolute;
      top: 6px;
      right: 8px;
      font-size: 12px;
      color: #667eea;
      font-weight: 800;
    }

    .action-row {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    .btn {
      flex: 1;
      padding: 14px;
      border-radius: 12px;
      border: none;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .btn:active { transform: scale(0.97); }

    .btn-secondary {
      background: #fff;
      color: #4a5568;
      border: 2px solid #e2e8f0;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #2d3748;
      color: #fff;
      padding: 12px 20px;
      border-radius: 100px;
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      transition: transform 0.3s ease;
      z-index: 999;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }

    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.error { background: #e53e3e; }

    .loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.8);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #e2e8f0;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Book Progress Runner */
    .book-progress-card {
      background: #fff;
      border-radius: 16px;
      padding: 16px 20px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .book-section-header {
      font-size: 15px;
      font-weight: 700;
      color: #2d3748;
      margin-bottom: 14px;
    }

    .runner-wrapper {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .runner-track-area {
      flex: 1;
      position: relative;
      height: 40px;
    }

    .runner-track-bg {
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 6px;
      background: #e2e8f0;
      border-radius: 3px;
      transform: translateY(-50%);
      overflow: hidden;
    }

    .runner-track-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea, #764ba2);
      border-radius: 3px;
      transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .runner-emoji {
      position: absolute;
      top: 50%;
      font-size: 22px;
      transform: translate(-50%, -50%);
      transition: left 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 2;
      line-height: 1;
    }

    .trophy-emoji {
      font-size: 24px;
      flex-shrink: 0;
    }

    .runner-label {
      text-align: center;
      font-size: 12px;
      color: #a0aec0;
      font-weight: 600;
      margin-bottom: 14px;
    }

    .today-chapters-wrap {
      border-top: 1px solid #f0f4f8;
      padding-top: 14px;
    }

    .today-chapters-header {
      font-size: 12px;
      font-weight: 700;
      color: #a0aec0;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    .chapter-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      background: #f7f8fc;
      border-radius: 10px;
      margin-bottom: 6px;
    }

    .chapter-item:last-child { margin-bottom: 0; }

    .chapter-num {
      min-width: 26px;
      height: 26px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .chapter-title {
      font-size: 13px;
      font-weight: 600;
      color: #2d3748;
    }

    .chapter-empty {
      font-size: 13px;
      color: #a0aec0;
      text-align: center;
      padding: 8px;
    }
  </style>
</head>
<body>

  <header>
    <h1>📚 독서 챌린지 현황</h1>
    <p id="last-updated">불러오는 중...</p>
  </header>

  <div class="date-bar">
    <label>날짜</label>
    <input type="date" id="date-picker" />
  </div>

  <div class="stat-card">
    <div class="rate" id="rate-display">0%</div>
    <div class="rate-label">챌린지 성공률</div>
    <div class="count-label" id="count-display">0 / 21명 인증</div>
    <div class="progress-bar">
      <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>

  <!-- Book Progress Runner -->
  <div class="book-progress-card">
    <div class="book-section-header">📖 책 진행도</div>
    <div class="runner-wrapper">
      <div class="runner-track-area">
        <div class="runner-track-bg">
          <div class="runner-track-fill" id="runner-fill" style="width:0%"></div>
        </div>
        <div class="runner-emoji" id="runner-emoji" style="left:0%">🏃</div>
      </div>
      <div class="trophy-emoji">🏆</div>
    </div>
    <div class="runner-label" id="runner-label">0 / 45 챕터 완료</div>
    <div class="today-chapters-wrap">
      <div class="today-chapters-header">오늘의 챕터</div>
      <div id="today-chapters-list"></div>
    </div>
  </div>

  <div class="section-title">멤버 인증 현황</div>
  <div class="member-grid" id="member-grid"></div>

  <div class="action-row">
    <button class="btn btn-secondary" onclick="loadFromSheets()">🔄 새로고침</button>
  </div>

  <div class="toast" id="toast"></div>
  <div class="loading-overlay" id="loading"><div class="spinner"></div></div>

<script>
// =====================
//  하드코딩 설정값
// =====================
const SHEET_ID      = '1IOY3D3CYQ1R9aYF6QooMucWhYDgSOzGzeHzbSj9i4J8';
const SHEET_NAME    = '시트2';
const API_KEY       = 'AIzaSyDqD4ECDE5xaoBeEoRyicDaqUJ5RN-dUgs';
const CLIENT_ID     = '44215227073-q4rnmebvgdklojddc43dsr1r7gm2qlrc.apps.googleusercontent.com';
const CLIENT_SECRET = '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';
const REFRESH_TOKEN = '1//04FjUOlf9xwIiCgYIARAAGAQSNwF-L9Ir5665xGlWI9AO7uWx6DHORfJLypgRnBM44W-BRre85Vkis6UV_NKZHXRjuArPdfwA_wA';

// =====================
//  고정 멤버
// =====================
const MEMBERS = [
  '롱게임', '비비드드림', '꿈요셉', '사쁘니', '행복소금',
  '미쁨댁', '우부왕', '금만가', '플리퍼즈', '스테디 릴리',
  '올댓드림', '오늘날씨맑음', '꿀람쥐', '꿈을 현실로', '뚜연',
  '라난', '럭셔리 노블', '레리꼬', '부자될또정', '하예', '뿌래랠래'
];

// =====================
//  책 챕터 데이터
// =====================
const CHAPTERS = [
  '금은 원래 흙이었다',
  '개츠비와 이노크, 두 가지 죽음 앞에서',
  '기회는 반드시 위기 속에서 나온다',
  '10년 주기론',
  '돈이 좋아하는 것들',
  '오늘의 법칙',
  '좋은 돈과 나쁜 돈',
  '부자가 되는 건 일거리가 달라지는 것',
  '자발적 피로를 선택하라',
  '부시맨의 콜라병',
  '무엇을 기다리는가',
  '경기가 좋지 않을 때 해야 하는 것',
  '가장 절망적인 악덕은 무지다',
  '돈을 부르는 자세가 있다',
  '낚시로부터 배운 것',
  '1달러를 벌어보자',
  '경쟁하지 말고 독점하는 법',
  '아무도 거들떠보지 않는 곳에 돈이 있다',
  '생각과 경험을 팔아야 큰돈을 벌 수 있다',
  '소비자가 아닌 생산자가 되어라',
  '위대한 3분의 법칙',
  '결국, 한 단어를 찾는 힘이다',
  '성공을 설명하는 하나의 단어',
  '이기적인 마음을 이용하라',
  '우연한 기회에 발견하는 것',
  '당연하다는 말의 의미',
  '일을 대하는 태도',
  '끈기의 뜻',
  '한 우물을 팔 것인가, 여러 우물을 팔 것인가',
  '투자의 5계명',
  '공부하고, 투자하라, 그리고 기다려라',
  "당신의 '곰스크'는 어디에 있는가",
  '변하지 않는 성공의 단 한 가지 법칙',
  '무한히 애쓸 수 있는 능력',
  '돈 버는 습관: 어떤, 행위를, 저절로',
  '일론 머스크에게는 있고, 당신에게는 없는 것',
  '호리병이 아닌 대접에 담을 것',
  '미래를 예측하는 법',
  '근로 소득을 높이는 방법',
  "'이곳'에서 '저곳'으로 넘어가는 원리",
  '뻔하게 사는 게 정답이다',
  '상상의 거인을 키워라',
  '"누구나 다 그렇게 될 수는 없잖아요?"',
  '고통을 이기지 못하면 고통이 그대를 이길 것이다',
  '비밀의 개수와 부는 비례한다'
];
const BOOK_START = new Date('2026-03-27T00:00:00');
const CHAPTERS_PER_DAY = 2;

function getBookProgress(dateStr) {
  const selected = new Date(dateStr + 'T00:00:00');
  const diffDays = Math.floor((selected - BOOK_START) / 86400000);
  const total = CHAPTERS.length;

  if (diffDays < 0) return { completed: 0, total, todayChapters: [] };

  const completed = Math.min((diffDays + 1) * CHAPTERS_PER_DAY, total);
  const startIdx = diffDays * CHAPTERS_PER_DAY;
  const todayChapters = [];
  for (let i = startIdx; i < Math.min(startIdx + CHAPTERS_PER_DAY, total); i++) {
    todayChapters.push({ num: i + 1, title: CHAPTERS[i] });
  }
  return { completed, total, todayChapters };
}

function renderBookProgress(dateStr) {
  const { completed, total, todayChapters } = getBookProgress(dateStr);
  const percent = total > 0 ? (completed / total) * 100 : 0;

  document.getElementById('runner-fill').style.width = `${percent}%`;
  document.getElementById('runner-emoji').style.left = `${Math.min(percent, 98)}%`;
  document.getElementById('runner-label').textContent = `${completed} / ${total} 챕터 완료`;

  const container = document.getElementById('today-chapters-list');
  if (todayChapters.length === 0) {
    container.innerHTML = '<div class="chapter-empty">챌린지 기간 외</div>';
  } else {
    container.innerHTML = todayChapters.map(ch =>
      `<div class="chapter-item">
        <div class="chapter-num">${ch.num}</div>
        <div class="chapter-title">${ch.title}</div>
      </div>`
    ).join('');
  }
}

let sheetData = {};
let tokenCache = { accessToken: '', tokenExpiry: 0 };

// =====================
//  날짜
// =====================
function today() {
  return new Date().toISOString().split('T')[0];
}

function getSelectedDate() {
  return document.getElementById('date-picker').value;
}

function initDatePicker() {
  const dp = document.getElementById('date-picker');
  dp.value = today();
  dp.addEventListener('change', render);
}

// =====================
//  렌더링 (출력만)
// =====================
function render() {
  const date   = getSelectedDate();
  const record = sheetData[date] || {};

  const checkedCount = MEMBERS.filter(m => record[m]).length;
  const total        = MEMBERS.length;
  const rate         = Math.round((checkedCount / total) * 100);

  document.getElementById('rate-display').textContent  = `${rate}%`;
  document.getElementById('count-display').textContent = `${checkedCount} / ${total}명 인증`;
  document.getElementById('progress-fill').style.width = `${rate}%`;

  const grid = document.getElementById('member-grid');
  grid.innerHTML = '';
  MEMBERS.forEach(name => {
    const btn = document.createElement('button');
    btn.className = 'member-btn' + (record[name] ? ' checked' : '');
    btn.textContent = name;
    // onclick 없음 → 클릭해도 아무 반응 없음
    grid.appendChild(btn);
  });

  renderBookProgress(date);
}

// =====================
//  토큰 자동 갱신
// =====================
async function getValidAccessToken() {
  if (tokenCache.accessToken && tokenCache.tokenExpiry > Date.now() + 5 * 60 * 1000) {
    return tokenCache.accessToken;
  }

  const res = await fetch('https://oauth2.googleapis.com/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({
      client_id:     CLIENT_ID,
      client_secret: CLIENT_SECRET,
      refresh_token: REFRESH_TOKEN,
      grant_type:    'refresh_token'
    })
  });

  const data = await res.json();
  if (!data.access_token) throw new Error('토큰 갱신 실패');

  tokenCache.accessToken = data.access_token;
  tokenCache.tokenExpiry = Date.now() + (data.expires_in || 3600) * 1000;
  return tokenCache.accessToken;
}

// =====================
//  시트에서 불러오기
// =====================
async function loadFromSheets() {
  setLoading(true);
  try {
    const token = await getValidAccessToken();
    const url   = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(SHEET_NAME)}?key=${API_KEY}`;
    const res   = await fetch(url);
    const data  = await res.json();

    if (!data.values) return;

    const rows      = data.values;
    const headerRow = rows[0] || [];
    const SPECIAL   = ['챌린지 성공', '챌린지 성공률'];

    const dateColumns = {};
    for (let i = 1; i < headerRow.length; i++) {
      const label = headerRow[i];
      if (!label || SPECIAL.includes(label)) continue;
      const parts = label.split('/');
      if (parts.length === 2) {
        const m = String(parseInt(parts[0])).padStart(2, '0');
        const d = String(parseInt(parts[1])).padStart(2, '0');
        dateColumns[i] = `2026-${m}-${d}`;
      }
    }

    const newData = {};
    for (let rowI = 1; rowI < rows.length; rowI++) {
      const row  = rows[rowI];
      const name = row[0];
      if (!name || SPECIAL.includes(name)) continue;
      if (!MEMBERS.includes(name)) continue;

      for (const [colIdx, dateStr] of Object.entries(dateColumns)) {
        const val = row[parseInt(colIdx)] || '';
        if (!newData[dateStr]) newData[dateStr] = {};
        newData[dateStr][name] = (val === 'O');
      }
    }

    sheetData = newData;
    render();

    const now = new Date();
    document.getElementById('last-updated').textContent =
      `마지막 업데이트: ${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')}`;

  } catch(e) {
    showToast(`❌ ${e.message}`, 'error');
    console.error(e);
  } finally {
    setLoading(false);
  }
}

// =====================
//  유틸
// =====================
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (type ? ` ${type}` : '');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function setLoading(on) {
  document.getElementById('loading').style.display = on ? 'flex' : 'none';
}

// =====================
//  앱 시작
// =====================
initDatePicker();
loadFromSheets();
</script>
</body>
</html>
